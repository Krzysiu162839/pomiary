<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <!-- Fonts (spójne z aplikacją) -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f172a;
      --card: #ffffff;
      --muted: #64748b;

      --primary: #3b82f6;
      --primary-dark: #1d4ed8;

      --border: #e2e8f0;
      --shadow: 0 10px 40px rgba(0,0,0,0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0b1220 0%, #0f172a 50%, #111827 100%);
      color: white;
    }

    /* CARD */
    .login-box {
      width: 360px;
      padding: 28px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      animation: fadeInUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    /* subtle glow */
    .login-box::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: radial-gradient(circle at top, rgba(59,130,246,0.25), transparent 60%);
      z-index: 0;
    }

    .login-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h3 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 12.5px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }

    input {
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      font-size: 14px;
      transition: 0.2s;
    }

    input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
      transform: scale(1.01);
    }

    button {
      margin-top: 6px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(59,130,246,0.25);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(59,130,246,0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    #err {
      font-size: 12.5px;
      text-align: center;
      min-height: 18px;
      color: #f87171;
      margin-top: 4px;
    }

    /* animacje spójne z resztą systemu */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* mobile */
    @media (max-width: 420px) {
      .login-box {
        width: 92vw;
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="login-content">
      <h3>🔐 Logowanie</h3>
      <div class="subtitle">System zarządzania aplikacją</div>

      <input id="login" placeholder="ID pracownika">
      <input id="haslo" type="password" placeholder="Hasło">

      <button onclick="login()">Zaloguj</button>

      <div id="err"></div>
    </div>
  </div>

  <script src="login.js"></script>

</body>
</html>
