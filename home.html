<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>System Pomiarów PRO</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
</head>

<body>

<header id="header">
  <button id="menuBtn">☰</button>
  <h1>System Pomiarów B1</h1>
  <div id="headerRight">
    <input type="date" id="dateFilter">
    <div class="operator-box">
      <span class="operator-icon">👤</span>
      <input id="operatorInput">
    </div>
    <button id="homeBtn" class="icon-btn">🏠</button>
  </div>
</header>

<div id="menuOverlay"></div>
<div id="menu"></div>

<div id="main">

  <!-- HOME -->
  <div id="home" class="card">
    <div class="card-header-row">
      <h3>📊 Complete Measurement History</h3>
      <div class="export-btn-group">
        <button id="exportAllBtn" class="btn-secondary">📥 CSV</button>
        <button id="exportAllPdfBtn" class="btn-secondary btn-pdf">📄 PDF</button>
      </div>
    </div>
    <div class="table-scroll">
      <table id="historiaAll">
        <thead>
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Model</th>
            <th>Part</th>
            <th>Part No.</th>
            <th>Operator</th>
            <th>Status</th>
            <th>NOK</th>
            <th>🔍</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <div class="card">
      <div id="modelHeader" class="modelHeader"></div>
      <button id="saveBtn">💾 Save</button>
      <div class="split">
        <div class="left">
          <img id="rysunekImg" src="" alt="rysunek">
        </div>
        <div class="right">
          <div id="form"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header-row">
        <h3>📋 Measurement History</h3>
        <div class="export-btn-group">
          <button id="exportPartBtn" class="btn-secondary">📥 CSV</button>
          <button id="exportPartPdfBtn" class="btn-secondary btn-pdf">📄 PDF</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="historia">
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Project</th>
              <th>Part</th>
              <th>Part No.</th>
              <th>Operator</th>
              <th>Status</th>
              <th>NOK</th>
              <th>🔍</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- MODAL: Measurement Details -->
<div id="modal">
  <div id="modalBox">
    <div class="modal-header-row">
      <h3>🔍 Measurement Details</h3>
      <button id="closeModalX">×</button>
    </div>
    <button id="pdfBtn">📄 Download PDF</button>
    <div id="modalInfo"></div>
    <div class="modalSplit">
      <div class="modalLeft">
        <img id="modalImg" src="" alt="rysunek">
      </div>
      <div class="modalRight">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Area</th>
                <th>Type</th>
                <th>SPEC</th>
                <th>Value</th>
                <th>LCL</th>
                <th>UCL</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="modalTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
